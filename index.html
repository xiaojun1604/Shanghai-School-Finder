<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上海闵行选校购房助手 - 二梯队专家</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>上海闵行选校购房助手</h1>
            <p class="subtitle">专为集体户、500万预算家长定制 | 锁定二梯队，避开一线卷</p>
        </header>

        <main class="dashboard">
            <!-- Left Side: Policy & User Status -->
            <section class="sidebar">
                <div class="card" id="user-status">
                    <h2>当前状态</h2>
                    <p><strong>户籍：</strong> 闵行紫藤社区 (集体户)</p>
                    <p><strong>学段：</strong> 小学/初中转学</p>
                    <p><strong>预算：</strong> ≤ 500万</p>
                    <div class="policy-badge">有户无房 → 统筹安排</div>
                    <hr style="margin: 1rem 0; border: 0; border-top: 1px solid #eee;">
                    <h3>专家建议</h3>
                    <p style="font-size: 0.9rem; color: var(--text-light);">
                        目前状态优先级较低。建议购房后将户口迁入房产，转为<strong>“人户一致”</strong>，这是进入二梯队名校的入场券。
                    </p>
                </div>

                <div class="card" style="margin-top: 1.5rem;">
                    <h2>入学优先级计算</h2>
                    <div id="priority-calc">
                        <label style="font-size: 0.9rem;">已有房产？</label>
                        <select id="has-property" style="width: 100%; margin-bottom: 0.5rem; padding: 5px;">
                            <option value="no">无房 (统筹)</option>
                            <option value="yes">有房 (人户一致)</option>
                        </select>
                        <label style="font-size: 0.9rem;">入户年限？</label>
                        <select id="years" style="width: 100%; padding: 5px;">
                            <option value="0">不满1年</option>
                            <option value="1">1-2年</option>
                            <option value="3">3年以上</option>
                        </select>
                        <div id="calc-result" style="margin-top: 1rem; font-weight: 700; color: var(--secondary);">
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: 1.5rem;">
                    <li><strong>五年一户：</strong> 购买前务必让中介核实该房产学位是否被占用。</li>
                    <li><strong>入户年限：</strong> 热门二梯队建议入户满1-2年。</li>
                    <li><strong>转学窗口：</strong> 每年1月、6月办理申请。</li>
                    </ul>
                </div>
            </section>

            <!-- Right Side: School Explorer & Map -->
            <section class="content">
                <div class="card" id="map-container"
                    style="height: 400px; margin-bottom: 2rem; padding: 0; overflow: hidden; position: relative;">
                    <div id="map" style="height: 100%; width: 100%; z-index: 1;"></div>
                    <div
                        style="position: absolute; bottom: 10px; right: 10px; z-index: 1000; background: white; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                        地图数据 © 高德地图
                    </div>
                </div>
                <div class="card">
                    <h2>二梯队名校推荐 (勾选在地图显示)</h2>
                    <div id="school-list" class="school-list">
                        <!-- Schools will be injected here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
